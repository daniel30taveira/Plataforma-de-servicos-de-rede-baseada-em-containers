version: '3.8'

services:
  # REVERSE PROXY E SERVIDOR WEB (Nginx)
  proxy_web:
    image: nginx:latest
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web:/usr/share/nginx/html:ro # Servidor Web Estático
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro # Configuração do Reverse Proxy 
    networks:
      - rede_interna


  # SERVIDOR DNS (Pi-Hole)
  servidor_dns:
    image: pihole/pihole:latest
    container_name: dns_pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80" # Painel de controlo administrativo do DNS
    environment:
      TZ: 'Europe/Lisbon'
      WEBPASSWORD: '123.,' 
    networks:
      - rede_interna


  # REDE PRIVADA VIRTUAL (WireGuard VPN)
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
      - SERVERURL=daniel-infra.ddns.net # Nome DNS Dinâmico em vez de IP Fixo
      - SERVERPORT=51821
      - PEERS=3 
      - PEERDNS=192.168.1.252
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - ./wireguard:/config
    ports:
      - "51821:51821/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    networks:
      - rede_interna


  # SERVIDOR DE FICHEIROS / CLOUD PRIVADA (Nextcloud)
  nextcloud:
    image: lscr.io/linuxserver/nextcloud:latest
    container_name: nextcloud
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
    volumes:
      - ./nextcloud/appdata:/config
      - ./nextcloud/data:/data
    ports:
      - "8081:443" 
    restart: unless-stopped
    networks:
      - rede_interna


  # SERVIDOR DE E-MAIL (Docker-Mailserver)
  mailserver:
    image: mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail
    domainname: local.lan
    ports:
      - "25:25"       # SMTP
      - "143:143"     # IMAP
      - "587:587"     # Submissão SMTP Seguro
      - "993:993"     # IMAP Seguro
    volumes:
      - ./mailserver/maildata:/var/mail
      - ./mailserver/mailstate:/var/mail-state
      - ./mailserver/mailconfig:/tmp/docker-mailserver
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ENABLE_SPAMASSASSIN=1
      - ENABLE_CLAMAV=0 # Desativado para poupar memória RAM no laboratório
      - ENABLE_FAIL2BAN=1
      - ONE_DIR=1
    restart: unless-stopped
    networks:
      - rede_interna



  # --- MONITORIZAÇÃO E OBSERVABILIDADE (MÉTRICAS) ---
  
  # Node Exporter (Métricas do Host)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - rede_interna


  # Prometheus (Base de dados de métricas)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - rede_interna


  # Grafana (Visualização de Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://192.168.1.252/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    networks:
      - rede_interna


  # Grafana Loki (Agregador de Logs)
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - rede_interna


  # Promtail (Agente de recolha de logs)
  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - rede_interna



# Rede isolada do tipo Bridge para comunicação segura inter-container
networks:
  rede_interna:
    driver: bridge